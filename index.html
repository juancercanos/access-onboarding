<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cercanos — Connecting Care &amp; Community v3</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #de8130; --tan: #a47864; --deep-purple: #2d1628; --blush: #e6d9d3;
    --brown: #5a4b44; --olive: #777b41; --gold: #f3bf57; --navy: #2f6089;
    --purple: #652875; --off-white: #faf8f6; --light-blush: #f5f0ed;
    --border: #e8e0db; --green: #4a8c5c; --red: #c94444; --amber: #b8860b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', -apple-system, sans-serif; background: var(--off-white); color: var(--deep-purple); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
  @keyframes typeCursor { 0%,100% { border-right-color: var(--orange); } 50% { border-right-color: transparent; } }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.03); } }
  .fade-in { animation: fadeIn 0.4s ease; }
  input[type=number]::-webkit-inner-spin-button { opacity: 1; }

  .nav { display: flex; align-items: center; justify-content: space-between; padding: 12px 32px; background: #fff; border-bottom: 2px solid var(--border); position: sticky; top: 0; z-index: 100; flex-wrap: wrap; gap: 8px; }
  .nav-logo { display: flex; align-items: center; gap: 10px; cursor: pointer; }
  .nav-heart { width: 36px; height: 36px; object-fit: contain; }
  .nav-wordmark { height: 22px; }
  .nav-sub { font-size: 12px; color: var(--tan); font-weight: 500; margin-left: 4px; }
  .nav-links { display: flex; gap: 8px; }
  .nav-btn { padding: 8px 18px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1.5px solid var(--border); background: transparent; color: var(--brown); font-family: inherit; transition: all 0.2s; }
  .nav-btn.active { background: var(--orange); color: #fff; border-color: var(--orange); }

  .input { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; color: var(--deep-purple); outline: none; background: var(--off-white); transition: border-color 0.2s; font-family: inherit; }
  .input:focus { border-color: var(--orange); }
  .input.alert { border-color: var(--red); background: #fef8f8; }
  select.input { appearance: auto; cursor: pointer; }
  .badge { font-size: 11px; font-weight: 600; padding: 2px 10px; border-radius: 12px; letter-spacing: 0.3px; display: inline-block; }
  .badge-green { background: #e8f5ec; color: var(--green); }
  .badge-orange { background: #fef3e8; color: var(--orange); }
  .badge-red { background: #fde8e8; color: var(--red); }
  .badge-navy { background: #e8f0f7; color: var(--navy); }
  .pill { font-size: 11px; padding: 3px 10px; border-radius: 6px; background: #fef8e8; color: var(--amber); font-weight: 500; display: inline-block; margin: 2px; }

  .btn-group { display: grid; gap: 8px; }
  .btn-opt { padding: 10px 8px; border-radius: 10px; border: 1.5px solid var(--border); background: #fff; color: var(--brown); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; font-family: inherit; text-align: center; }
  .btn-opt.active { border-color: var(--orange); background: var(--orange); color: #fff; }
  .btn-primary { padding: 12px 32px; border-radius: 12px; border: none; font-size: 14px; font-weight: 700; background: linear-gradient(135deg, var(--orange), var(--gold)); color: #fff; cursor: pointer; font-family: inherit; box-shadow: 0 4px 16px #de813033; }
  .btn-secondary { padding: 12px 24px; border-radius: 10px; border: 1.5px solid var(--border); background: #fff; font-size: 14px; font-weight: 600; color: var(--brown); cursor: pointer; font-family: inherit; }
  .btn-analyze { padding: 12px 32px; border-radius: 12px; border: none; font-size: 14px; font-weight: 700; background: linear-gradient(135deg, var(--olive), var(--green)); color: #fff; cursor: pointer; font-family: inherit; }

  .form-card { border: 2px solid var(--orange); border-radius: 16px; padding: 28px; background: #fff; box-shadow: 0 2px 12px rgba(0,0,0,0.04); margin-bottom: 20px; }
  .form-card.olive { border-color: var(--olive); } .form-card.navy { border-color: var(--navy); } .form-card.purple { border-color: var(--purple); } .form-card.red { border-color: var(--red); } .form-card.teal { border-color: #2a9d8f; }

  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 20px; }
  .field-label { font-size: 13px; font-weight: 600; color: var(--deep-purple); margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
  .field-unit { font-weight: 400; color: var(--tan); font-size: 12px; }
  .field-hint { font-size: 11px; color: var(--tan); margin-top: 4px; line-height: 1.4; }

  /* COACH - patient-facing, single persona */
  .coach { display: flex; gap: 20px; align-items: flex-start; margin-bottom: 28px; animation: fadeIn 0.5s ease; }
  .coach-avatar { flex-shrink: 0; width: 76px; height: 76px; border-radius: 50%; background: linear-gradient(135deg, #fef3e8, #fde8e8); display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 16px rgba(0,0,0,0.08); animation: float 3s ease-in-out infinite; position: relative; }
  .coach-avatar img { width: 44px; height: 44px; object-fit: contain; }
  .coach-status { position: absolute; bottom: 2px; right: 2px; width: 14px; height: 14px; border-radius: 50%; background: var(--green); border: 2px solid #fff; }
  .coach-bubble { background: linear-gradient(135deg, #f0ebe7, #fef8f0); border: 1.5px solid var(--border); border-radius: 18px; padding: 18px 24px; flex: 1; position: relative; box-shadow: 0 4px 16px rgba(0,0,0,0.04); }
  .coach-bubble::before { content: ''; position: absolute; left: -10px; top: 24px; width: 0; height: 0; border-top: 10px solid transparent; border-bottom: 10px solid transparent; border-right: 10px solid #f0ebe7; }
  .coach-name { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; color: var(--orange); margin-bottom: 6px; text-transform: uppercase; }
  .coach-text { font-size: 15px; color: var(--brown); line-height: 1.7; }
  .coach-text strong { color: var(--orange); }
  .coach-text .hl { background: linear-gradient(120deg, #fef3e8 0%, #fef3e8 100%); padding: 1px 6px; border-radius: 4px; }

  .steps { display: flex; gap: 8px; justify-content: center; margin-bottom: 28px; flex-wrap: wrap; }
  .step-item { display: flex; align-items: center; gap: 6px; }
  .step-box { display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 6px 10px; border-radius: 10px; font-size: 10px; font-weight: 600; border: 1.5px solid var(--border); color: var(--brown); opacity: 0.6; transition: all 0.3s; white-space: nowrap; cursor: pointer; }
  .step-box.active { background: var(--orange); color: #fff; border-color: var(--orange); opacity: 1; }
  .step-box.done { background: var(--olive); color: #fff; border-color: var(--olive); opacity: 1; }
  .step-line { width: 16px; height: 2px; background: var(--border); } .step-line.done { background: var(--olive); }

  .section-hdr { margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
  .section-hdr h3 { display: flex; align-items: center; gap: 8px; margin: 0 0 6px; font-size: 16px; font-weight: 700; }
  .section-hdr p { margin: 0; font-size: 12px; color: var(--tan); line-height: 1.5; }

  .pain-grid { display: grid; grid-template-columns: repeat(11, 1fr); gap: 4px; }
  .pain-btn { width: 100%; aspect-ratio: 1; border-radius: 50%; border: 1.5px solid var(--border); background: #fff; color: var(--brown); font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: inherit; }
  .check-item { display: flex; align-items: center; gap: 12px; padding: 14px 16px; cursor: pointer; border-bottom: 1px solid var(--border); }
  .check-item input { width: 18px; height: 18px; accent-color: var(--orange); flex-shrink: 0; }

  .bmi-scale { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 2px; border-radius: 8px; overflow: hidden; margin-bottom: 28px; }
  .bmi-cell { padding: 10px 6px; text-align: center; font-size: 11px; background: var(--light-blush); color: var(--tan); border: 1px solid var(--border); }
  .bmi-cell.active { color: #fff; font-weight: 700; border: none; }

  .screen-options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
  .screen-opt { padding: 10px 12px; border-radius: 10px; border: 1.5px solid var(--border); background: #fff; color: var(--brown); font-size: 13px; cursor: pointer; transition: all 0.2s; font-family: inherit; display: flex; align-items: center; gap: 8px; }
  .screen-opt.active-orange { border-color: var(--orange); background: #fef3e8; color: var(--orange); }
  .screen-opt.active-red { border-color: var(--red); background: #fde8e8; color: var(--red); }
  .screen-opt .radio { width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .screen-opt.active-orange .radio, .screen-opt.active-red .radio { border-color: currentColor; }
  .screen-opt.active-orange .radio::after, .screen-opt.active-red .radio::after { content: ''; width: 8px; height: 8px; border-radius: 50%; background: currentColor; }

  .score-bar { border-radius: 10px; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
  .score-value { font-size: 28px; font-weight: 800; }
  .info-box { border-radius: 10px; padding: 16px; margin-bottom: 20px; }
  .info-box h4 { margin: 0 0 6px; font-size: 14px; } .info-box p { margin: 0; font-size: 12px; line-height: 1.5; }

  .accordion { border: 1.5px solid var(--border); border-radius: 12px; margin-bottom: 10px; overflow: hidden; background: #fff; }
  .accordion-header { display: flex; align-items: center; gap: 12px; padding: 16px 20px; cursor: pointer; background: #fff; transition: background 0.2s; user-select: none; }
  .accordion-header:hover { background: var(--light-blush); }
  .accordion-title { flex: 1; font-size: 14px; font-weight: 700; }
  .accordion-count { font-size: 11px; font-weight: 600; padding: 2px 10px; border-radius: 10px; background: var(--light-blush); color: var(--tan); }
  .accordion-arrow { font-size: 12px; color: var(--tan); transition: transform 0.3s; } .accordion-arrow.open { transform: rotate(180deg); }
  .accordion-body { display: none; padding: 0 20px 16px; border-top: 1px solid var(--border); } .accordion-body.open { display: block; }

  .scan-area { border: 2px dashed var(--border); border-radius: 14px; padding: 28px; text-align: center; cursor: pointer; transition: all 0.3s; background: var(--off-white); }
  .scan-area:hover { border-color: var(--orange); background: #fef8f0; }

  .consent-box { border: 1.5px solid var(--border); border-radius: 12px; padding: 16px; background: #fafafa; max-height: 150px; overflow-y: auto; font-size: 12px; line-height: 1.6; color: var(--brown); margin-bottom: 12px; }
  .consent-agree { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-radius: 10px; cursor: pointer; }
  .consent-agree.agreed { background: #e8f5ec; border: 1.5px solid var(--green); }
  .consent-agree:not(.agreed) { background: #fef3e8; border: 1.5px solid var(--orange); }

  .med-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .med-chip { display: flex; align-items: center; gap: 8px; padding: 10px 14px; border-radius: 10px; border: 1.5px solid var(--border); background: #fff; font-size: 12px; cursor: pointer; transition: all 0.2s; font-family: inherit; }
  .med-chip.active { border-color: var(--navy); background: #e8f0f7; color: var(--navy); font-weight: 600; }
  .med-chip input { width: 16px; height: 16px; accent-color: var(--navy); }

  .gauge-card { background: var(--deep-purple); border-radius: 20px; padding: 32px 40px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
  .scale-bar { display: flex; border-radius: 6px; overflow: hidden; height: 10px; margin-top: 16px; }
  .conditions-table { background: #fff; border-radius: 16px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 24px; }
  .conditions-header { background: var(--light-blush); padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
  .condition-row { display: flex; align-items: center; gap: 16px; padding: 14px 24px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .condition-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .type-badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 4px; color: #fff; text-transform: uppercase; }
  .care-team-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .care-team-card { background: rgba(255,255,255,0.08); border-radius: 12px; padding: 16px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
  .summary-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
  .summary-card { background: #fff; border-radius: 14px; padding: 20px 24px; border: 1px solid var(--border); }
  .filter-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
  .filter-btns { display: flex; gap: 8px; align-items: center; }
  .filter-btn { padding: 6px 16px; border-radius: 8px; border: 1.5px solid var(--border); background: #fff; color: var(--brown); font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .filter-btn.active { background: var(--orange); color: #fff; border-color: var(--orange); }
  .roster-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .roster-table th { padding: 12px 8px; text-align: center; font-weight: 700; font-size: 11px; background: var(--light-blush); border-bottom: 2px solid var(--border); }
  .roster-table th:first-child { text-align: left; padding-left: 16px; font-size: 13px; }
  .roster-table td { padding: 14px 8px; text-align: center; border-bottom: 1px solid var(--border); }
  .roster-table td:first-child { text-align: left; padding-left: 16px; }
  .roster-dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; }
  .bottom-panels { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .bottom-panel { background: #fff; border-radius: 14px; padding: 24px; border: 1px solid var(--border); }
  @media (max-width: 768px) { .row,.med-grid { grid-template-columns: 1fr; } .row-3 { grid-template-columns: 1fr; } .summary-cards { grid-template-columns: 1fr 1fr; } .care-team-grid { grid-template-columns: 1fr 1fr; } .bottom-panels { grid-template-columns: 1fr; } .nav { padding: 10px 12px; } .nav-logo { gap: 6px; } .nav-heart { width: 28px; height: 28px; } .nav-wordmark { height: 18px; } .nav-links { gap: 4px; } .nav-btn { padding: 6px 12px; font-size: 11px; } }
</style>
</head>
<body>
<header class="nav">
  <div class="nav-logo" onclick="navigate('home')">
    <div style="position:relative;display:inline-block"><img class="nav-heart" id="nav-heart-img" src="" alt="Cercanos Heart">
    </div><img class="nav-wordmark" id="nav-logo-img" src="" alt="cercanos">
    
  </div>
  <nav class="nav-links">
    <button class="nav-btn active" id="nav-home" onclick="navigate('home')">Home</button>
    <button class="nav-btn" id="nav-roster" onclick="navigate('roster')">Panel Analytics</button>
  </nav>
</header>
<main id="app"></main>

// UNIT CONVERSION HELPERS
function cmToFtIn(cm){if(!cm)return{ft:'',in:''};const totalIn=cm/2.54;const ft=Math.floor(totalIn/12);const inc=Math.round(totalIn%12);return{ft,in:inc};}
function ftInToCm(ft,inc){return Math.round((+ft*12+ +inc)*2.54);}
function kgToLb(kg){if(!kg)return '';return Math.round(kg*2.205);}
function lbToKg(lb){if(!lb)return '';return Math.round(+lb/2.205);}
function toggleHeightUnit(){P.heightUnit=P.heightUnit==='metric'?'imperial':'metric';render();}
function toggleWeightUnit(){P.weightUnit=P.weightUnit==='metric'?'imperial':'metric';render();}
function ufFtIn(ft,inc){P.height=ftInToCm(ft||0,inc||0);render();}
function ufLb(lb){P.weight=lbToKg(lb);render();}

// HELPERS
function getBmiCat(b){if(b<18.5)return{l:'Underweight',c:'badge-navy'};if(b<25)return{l:'Normal',c:'badge-green'};if(b<30)return{l:'Overweight',c:'badge-orange'};return{l:'Obese',c:'badge-red'};}
function rb(v,o,b){if(v<=o)return'<span class="badge badge-green">Optimal</span>';if(v<=b)return'<span class="badge badge-orange">Borderline</span>';return'<span class="badge badge-red">At Risk</span>';}
function hb(v){return v>=60?'<span class="badge badge-green">Optimal</span>':v>=40?'<span class="badge badge-orange">Borderline</span>':'<span class="badge badge-red">At Risk</span>';}
function eb(v){return v>=90?'<span class="badge badge-green">Optimal</span>':v>=60?'<span class="badge badge-orange">Borderline</span>':'<span class="badge badge-red">At Risk</span>';}

function calcRisk(d){let s=0,mx=0;const conds=[],gaps=[];const bmi=d.weight/((d.height/100)**2);mx+=5;if(bmi>=30){s+=5;conds.push({n:'Obesity',t:'active',g:['Weight management','GLP-1 evaluation']});}else if(bmi>=25){s+=2;conds.push({n:'Overweight risk',t:'predicted',g:['Nutrition counseling']});}mx+=5;if(d.hba1c>=6.5){s+=5;conds.push({n:'Type 2 Diabetes',t:'active',g:['Diabetes care','A1C monitoring']});}else if(d.hba1c>=5.7){s+=3;conds.push({n:'Prediabetes risk',t:'predicted',g:['Prediabetes monitoring','Lifestyle intervention']});}mx+=4;if(d.systolic>=140||d.diastolic>=90){s+=4;conds.push({n:'Hypertension',t:'active',g:['BP management','Medication review']});}else if(d.systolic>=130||d.diastolic>=85){s+=2;conds.push({n:'Elevated BP',t:'predicted',g:['BP monitoring']});}mx+=4;if(d.ldl>=160||d.triglycerides>=200){s+=4;conds.push({n:'Dyslipidemia',t:'active',g:['Lipid follow-up','Statin optimization']});}else if(d.ldl>=130||d.triglycerides>=150){s+=2;conds.push({n:'Dyslipidemia risk',t:'predicted',g:['Lipid follow-up']});}mx+=2;if(d.hdl<40){s+=2;gaps.push('HDL improvement');}mx+=3;if(d.egfr<60){s+=3;conds.push({n:'CKD risk',t:'predicted',g:['Nephrology referral','CKD management']});}else if(d.egfr<90){s+=1;gaps.push('Kidney monitoring');}mx+=3;const ph=(d.phq2_q1>=0?d.phq2_q1:0)+(d.phq2_q2>=0?d.phq2_q2:0),ga=(d.gad2_q1>=0?d.gad2_q1:0)+(d.gad2_q2>=0?d.gad2_q2:0);if(ph>=3){s+=2;conds.push({n:'Depression positive',t:'active',g:['Mental health follow-up','Psychology referral']});}if(ga>=3){s+=1;conds.push({n:'Anxiety positive',t:'active',g:['Anxiety counseling']});}mx+=4;if(d.physicalActivity<3){s+=1;gaps.push('Exercise counseling');}if(d.sleepDuration<6){s+=1;gaps.push('Sleep assessment');}if(d.stressLevel>=7){s+=1;gaps.push('Stress management');}if((d.medications||[]).length>=5){s+=1;gaps.push('Pharmacy review');}mx+=3;if(d.erVisits>=2){s+=2;gaps.push('Care coordination');}if(d.hospitalizations>=1){s+=1;gaps.push('Post-discharge follow-up');}mx+=5;const rf=d.riskFactors||[],sf=d.sdohFactors||[];if(rf.includes('currentSmoker')){s+=2;gaps.push('Tobacco cessation');}if(rf.includes('medicationAdherence')){s+=1;gaps.push('Adherence coaching');}if(rf.includes('familyDiabetes'))s+=0.5;if(rf.includes('familyCardiac'))s+=1;if(sf.includes('foodInsecurity')){s+=0.5;gaps.push('SDOH resources');}if(sf.includes('financialStrain')){s+=0.5;gaps.push('Assistance programs');}const pct=Math.min(Math.round((s/mx)*100),100);const lv=pct>=65?'High':pct>=35?'Moderate':'Low';const iv=pct>=65?'Intensive Care Program':pct>=35?'Active Monitoring':'Prevention & Education';return{s,mx,pct,lv,conds,gaps,iv};}

// COACH - always same coach, talks to patient
let coachTyped={};
function typeCoach(elId, html){
  const el=document.getElementById(elId);
  if(!el||coachTyped[elId])return;
  coachTyped[elId]=true;
  el.style.visibility='visible';
  // Parse HTML into text segments and tags
  let i=0,buf='',inTag=false;
  const step=()=>{
    if(i>=html.length){el.innerHTML=html;return;}
    const ch=html[i];
    if(ch==='<'){inTag=true;const end=html.indexOf('>',i);if(end>-1){buf+=html.substring(i,end+1);i=end+1;}else{buf+=ch;i++;}}
    else{buf+=ch;i++;}
    if(!inTag){el.innerHTML=buf+'<span style="border-right:2px solid var(--orange);animation:typeCursor 0.8s infinite;padding-right:1px">&nbsp;</span>';}else{inTag=false;}
    const delay=inTag?0:(ch===' '?15:ch==='.'||ch==='!'||ch==='?'?80:22);
    setTimeout(step,delay);
  };
  step();
}
function coach(text,bg){
  const cId='coach-'+Math.random().toString(36).substr(2,6);
  setTimeout(()=>typeCoach(cId,text),200);
  return `<div class="coach"><div class="coach-avatar"><div style="font-size:40px">👩🏽‍⚕️</div><div class="coach-status"></div></div><div class="coach-bubble" style="background:${bg||'linear-gradient(135deg,#f0ebe7,#fef8f0)'}"><div class="coach-name">Your Cercanos Care Coach</div><div class="coach-text" id="${cId}" style="visibility:hidden;min-height:40px">${text}</div></div></div>`;
}
